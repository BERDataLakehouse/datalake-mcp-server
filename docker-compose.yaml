# Docker Compose configuration for testing BERDL Datalake MCP Server
# This docker-compose is for developer convenience, not for running in production.
#
# INSTRUCTIONS:
# =============
#
# OPTION A: USING PRE-BUILT IMAGES (RECOMMENDED FOR MOST USERS)
# --------------------------------------------------------------
# If you want to use pre-built images from the registry:
# 1. Uncomment the 'image:' and 'platform:' lines in each service
# 2. Comment out the 'build:' sections
# 3. Run: docker compose up -d
#
# No build steps required!
#
# OPTION B: BUILDING FROM LOCAL SOURCE CODE (FOR DEVELOPERS)
# -----------------------------------------------------------
# If you're developing and want to build from local source:
#
# 1. CLONE REQUIRED REPOSITORIES:
#    You need to clone the following repos from https://github.com/BERDataLakehouse
#    at the same directory level as this datalake-mcp-server directory:
#
#    git clone https://github.com/BERDataLakehouse/spark_notebook_base.git
#    git clone https://github.com/BERDataLakehouse/kube_spark_manager_image.git
#    git clone https://github.com/BERDataLakehouse/minio_manager_service.git
#    git clone https://github.com/BERDataLakehouse/trino_access_control.git
#
#    Your directory structure should look like:
#    parent/
#      ├── datalake-mcp-server/      (this directory)
#      ├── spark_notebook_base/
#      ├── kube_spark_manager_image/
#      ├── minio_manager_service/
#      └── trino_access_control/
#
# 2. BUILD REQUIRED BASE IMAGES FIRST:
#    cd ../spark_notebook_base && \
#    docker build -t spark_notebook_base:local .
#
# 3. ENSURE BUILD SECTIONS ARE UNCOMMENTED:
#    The docker-compose.yaml should have 'build:' sections uncommented
#    and 'image:' lines commented out for services you want to build locally.
#
# 4. RUN DOCKER COMPOSE:
#    docker compose up -d --build
#
#    NOTE: Base images must be rebuilt when Dockerfiles or dependencies change.
#
# ENVIRONMENT SETUP (REQUIRED FOR BOTH OPTIONS):
# ------------------------------------------------
# 1. Copy .env.example to .env and set your KBase usernames:
#      cp .env.example .env
# 2. The .env file defines CONNECT_USER and STANDALONE_USER for the two
#    test user personas (Spark Connect vs Standalone fallback).
#
# DEFAULT CREDENTIALS:
# --------------------
# - MinIO: minio/minio123
# - PostgreSQL: hive/hivepassword
#
# ARCHITECTURE NOTES:
# -------------------
# This stack includes:
# - Spark standalone cluster (master + 2 workers)
# - Trino query engine (coordinator + worker)
# - MinIO S3-compatible storage
# - MinIO Manager Service (credential/governance API)
# - PostgreSQL (Hive Metastore + MMS backend)
# - Redis (distributed caching)
# - Datalake MCP Server (main service under test)

services:
  datalake-mcp-server:
    # image: ghcr.io/berdatalakehouse/datalake-mcp-server:main
    # platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_TAG: local
        BASE_REGISTRY: ""
    ports:
      - "8000:8000"  # MCP server API
    environment:
      # =========================================================================
      # MIXED MODE CONFIGURATION
      # =========================================================================
      # CONNECT_USER:    sc://spark-notebook-{CONNECT_USER}:15002 → running → Spark Connect
      # STANDALONE_USER: sc://spark-notebook-{STANDALONE_USER}:15002 → NOT running → Standalone fallback
      # =========================================================================
      - SPARK_CONNECT_URL_TEMPLATE=sc://spark-notebook-{username}:15002
      - SHARED_SPARK_MASTER_URL=spark://standalone-spark-master:7077
      - SPARK_MASTER_URL=spark://spark-master:7077
      - BERDL_HIVE_METASTORE_URI=thrift://hive-metastore:9083

      # MINIO CONFIGURATION
      - MINIO_ENDPOINT_URL=minio:9002

      # AUTHENTICATION CONFIGURATION
      - KBASE_AUTH_URL=https://ci.kbase.us/services/auth/
      - KBASE_ADMIN_ROLES=CDM_JUPYTERHUB_ADMIN
      - KBASE_REQUIRED_ROLES=BERDL_USER
      - MFA_EXEMPT_USERS=${MFA_EXEMPT_USERS:-${CONNECT_USER},${STANDALONE_USER},kbaselakehouseserviceaccount}

      # REDIS CONFIGURATION
      - BERDL_REDIS_HOST=redis
      - BERDL_REDIS_PORT=6379

      # DATA LAKE CONFIGURATION
      - DELTALAKE_WAREHOUSE_DIR=s3a://cdm-lake/users-sql-warehouse

      # DATA GOVERNANCE CONFIGURATION
      - GOVERNANCE_API_URL=http://minio-manager-service:8000

      # POLARIS CONFIGURATION (per-user credentials provisioned dynamically)
      - POLARIS_CATALOG_URI=http://polaris:8181/api/catalog

      # TRINO CONFIGURATION
      - TRINO_HOST=trino
      - TRINO_PORT=8080
      - QUERY_ENGINE=spark
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/apis/mcp/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      spark-master:
        condition: service_healthy
      spark-connect-notebook:
        condition: service_healthy
      standalone-spark-master:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      minio-manager-service:
        condition: service_healthy
      polaris:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      trino:
        condition: service_healthy

  # =========================================================================
  # SPARK CONNECT NOTEBOOK (dedicated cluster for CONNECT_USER)
  # =========================================================================
  # Provides dedicated Spark Connect server for the CONNECT_USER.
  # Requests route to sc://spark-notebook-{CONNECT_USER}:15002 via network alias.
  # =========================================================================
  spark-connect-notebook:
    # image: ghcr.io/berdatalakehouse/kube_spark_manager_image:main
    # platform: linux/amd64
    build:
      context: ../kube_spark_manager_image
      dockerfile: Dockerfile
      args:
        BASE_TAG: local
        BASE_REGISTRY: ""
    ports:
      - "15103:15002"  # Spark Connect server (host accessible for test data creation)
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=0.0.0.0
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - BERDL_REDIS_HOST=redis
      - BERDL_REDIS_PORT=6379
      - BERDL_DELTALAKE_WAREHOUSE_DIRECTORY_PATH=s3a://cdm-lake/users-sql-warehouse
      - BERDL_HIVE_METASTORE_URI=thrift://hive-metastore:9083
      - USER=${CONNECT_USER}
      # KBaseAuthServerInterceptor needs this to validate per-request KBase tokens
      # (matches spark_notebook production: configs/spark-defaults.conf.template).
      - KBASE_AUTH_URL=https://ci.kbase.us/services/auth/
    # Start ONLY Spark Connect server (user's dedicated cluster).
    # Configs here mirror spark_notebook production
    # (configs/spark-defaults.conf.template + connect_server.py):
    # - Iceberg + Delta + Sedona extensions side-by-side
    # - Polaris REST catalogs registered at startup (Spark Connect requires this:
    #   spark.sql.catalog.<name>.* configs are immutable post-startup, so the
    #   user's notebook pod registers per-user catalogs at boot in production.
    #   For docker-compose we use Polaris root creds and register both
    #   CONNECT_USER's personal catalog ("my" + short-username alias) and the
    #   shared "globalusers" tenant catalog.)
    # - KBaseAuthServerInterceptor for per-request KBase token validation
    # - Hive metastore version/jars overrides intentionally NOT set (production
    #   commented those out: forcing 4.0.0 selects Shim_v4_0 which throws
    #   NoSuchMethodException against the bundled Hive 2.3 jars)
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/scripts/check_env.sh &&
        $$SPARK_HOME/sbin/start-connect-server.sh \
          --master local[4] \
          --conf spark.driver.host=spark-connect-notebook \
          --conf spark.sql.warehouse.dir=s3a://cdm-lake/users-sql-warehouse/ \
          --conf spark.hadoop.fs.s3a.endpoint=http://minio:9002 \
          --conf spark.hadoop.fs.s3a.access.key=minio \
          --conf spark.hadoop.fs.s3a.secret.key=minio123 \
          --conf spark.hadoop.fs.s3a.path.style.access=true \
          --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem \
          --conf spark.hadoop.fs.s3a.connection.ssl.enabled=false \
          --conf spark.hadoop.hive.metastore.uris=thrift://hive-metastore:9083 \
          --conf spark.sql.catalogImplementation=hive \
          --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension,org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.apache.sedona.sql.SedonaSqlExtensions \
          --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog \
          --conf spark.databricks.delta.retentionDurationCheck.enabled=false \
          --conf spark.connect.session.manager.defaultSessionTimeout=10h \
          --conf spark.connect.grpc.interceptor.classes=us.kbase.spark.KBaseAuthServerInterceptor \
          --conf spark.sql.catalog.my=org.apache.iceberg.spark.SparkCatalog \
          --conf spark.sql.catalog.my.type=rest \
          --conf spark.sql.catalog.my.uri=http://polaris:8181/api/catalog \
          --conf spark.sql.catalog.my.credential=root:s3cr3t \
          --conf spark.sql.catalog.my.warehouse=user_$${USER} \
          --conf spark.sql.catalog.my.scope=PRINCIPAL_ROLE:ALL \
          --conf spark.sql.catalog.my.token-refresh-enabled=false \
          --conf spark.sql.catalog.my.s3.endpoint=http://minio:9002 \
          --conf spark.sql.catalog.my.s3.access-key-id=minio \
          --conf spark.sql.catalog.my.s3.secret-access-key=minio123 \
          --conf spark.sql.catalog.my.s3.path-style-access=true \
          --conf spark.sql.catalog.my.s3.region=us-east-1 \
          --conf spark.sql.catalog.$${USER}=org.apache.iceberg.spark.SparkCatalog \
          --conf spark.sql.catalog.$${USER}.type=rest \
          --conf spark.sql.catalog.$${USER}.uri=http://polaris:8181/api/catalog \
          --conf spark.sql.catalog.$${USER}.credential=root:s3cr3t \
          --conf spark.sql.catalog.$${USER}.warehouse=user_$${USER} \
          --conf spark.sql.catalog.$${USER}.scope=PRINCIPAL_ROLE:ALL \
          --conf spark.sql.catalog.$${USER}.token-refresh-enabled=false \
          --conf spark.sql.catalog.$${USER}.s3.endpoint=http://minio:9002 \
          --conf spark.sql.catalog.$${USER}.s3.access-key-id=minio \
          --conf spark.sql.catalog.$${USER}.s3.secret-access-key=minio123 \
          --conf spark.sql.catalog.$${USER}.s3.path-style-access=true \
          --conf spark.sql.catalog.$${USER}.s3.region=us-east-1 \
          --conf spark.sql.catalog.globalusers=org.apache.iceberg.spark.SparkCatalog \
          --conf spark.sql.catalog.globalusers.type=rest \
          --conf spark.sql.catalog.globalusers.uri=http://polaris:8181/api/catalog \
          --conf spark.sql.catalog.globalusers.credential=root:s3cr3t \
          --conf spark.sql.catalog.globalusers.warehouse=tenant_globalusers \
          --conf spark.sql.catalog.globalusers.scope=PRINCIPAL_ROLE:ALL \
          --conf spark.sql.catalog.globalusers.token-refresh-enabled=false \
          --conf spark.sql.catalog.globalusers.s3.endpoint=http://minio:9002 \
          --conf spark.sql.catalog.globalusers.s3.access-key-id=minio \
          --conf spark.sql.catalog.globalusers.s3.secret-access-key=minio123 \
          --conf spark.sql.catalog.globalusers.s3.path-style-access=true \
          --conf spark.sql.catalog.globalusers.s3.region=us-east-1 &&
        tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/15002'"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - ./configs/hive-site.xml:/usr/local/spark/conf/hive-site.xml:ro
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      default:
        aliases:
          - spark-notebook-${CONNECT_USER}

  # =========================================================================
  # STANDALONE SPARK CLUSTER (shared cluster for STANDALONE_USER)
  # =========================================================================
  # This is a separate Spark cluster for standalone mode (no Spark Connect).
  # When STANDALONE_USER's request fails to connect via Spark Connect, it falls back here.
  # =========================================================================
  standalone-spark-master:
    # image: ghcr.io/berdatalakehouse/kube_spark_manager_image:main
    # platform: linux/amd64
    build:
      context: ../kube_spark_manager_image
      dockerfile: Dockerfile
      args:
        BASE_TAG: local
        BASE_REGISTRY: ""
    ports:
      - "8291:8080"  # Spark Master Web UI (standalone)
      - "7079:7077"  # Spark Master port (standalone)
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=0.0.0.0
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - BERDL_REDIS_HOST=redis
      - BERDL_REDIS_PORT=6379
      - BERDL_DELTALAKE_WAREHOUSE_DIRECTORY_PATH=s3a://cdm-lake/users-sql-warehouse
      - BERDL_HIVE_METASTORE_URI=thrift://hive-metastore:9083
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/7077'"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./configs/hive-site.xml:/usr/local/spark/conf/hive-site.xml:ro
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  standalone-spark-worker:
    # image: ghcr.io/berdatalakehouse/kube_spark_manager_image:main
    # platform: linux/amd64
    build:
      context: ../kube_spark_manager_image
      dockerfile: Dockerfile
      args:
        BASE_TAG: local
        BASE_REGISTRY: ""
    ports:
      - "8293:8081"  # Spark Worker Web UI (standalone)
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://standalone-spark-master:7077
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_PORT=8081
      - SPARK_WORKER_WEBUI_PORT=8081
      - BERDL_REDIS_HOST=redis
      - BERDL_REDIS_PORT=6379
      - BERDL_DELTALAKE_WAREHOUSE_DIRECTORY_PATH=s3a://cdm-lake/users-sql-warehouse
      - BERDL_HIVE_METASTORE_URI=thrift://hive-metastore:9083
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'spark.deploy.worker' > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      standalone-spark-master:
        condition: service_healthy

  minio-manager-service:
    # image: ghcr.io/berdatalakehouse/minio_manager_service:main
    # platform: linux/amd64
    build:
      context: ../minio_manager_service
      dockerfile: Dockerfile
    ports:
      - "8006:8000"
    environment:
      - MINIO_ENDPOINT=http://minio:9002
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
      - KBASE_AUTH_URL=https://ci.kbase.us/services/auth/
      - KBASE_ADMIN_ROLES=CDM_JUPYTERHUB_ADMIN
      - KBASE_APPROVED_ROLES=BERDL_USER
      - REDIS_URL=redis://redis:6379
      # Polaris admin credentials (only the governance service needs root access)
      - POLARIS_CATALOG_URI=http://polaris:8181/api/catalog
      - POLARIS_CREDENTIAL=root:s3cr3t
      # Credential store (PostgreSQL)
      - MMS_DB_HOST=postgres
      - MMS_DB_PORT=5432
      - MMS_DB_NAME=mms
      - MMS_DB_USER=mms
      - MMS_DB_PASSWORD=mmspassword
      - MMS_DB_ENCRYPTION_KEY=change-me-in-prod
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      minio:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      polaris:
        condition: service_healthy

  spark-master:
    # image: ghcr.io/berdatalakehouse/kube_spark_manager_image:main
    # platform: linux/amd64
    build:
      context: ../kube_spark_manager_image
      dockerfile: Dockerfile
      args:
        BASE_TAG: local
        BASE_REGISTRY: ""
    ports:
      - "8190:8080"     # Spark Master Web UI (use 8190 to avoid conflicts)
      - "7078:7077"     # Spark Master (use 7078 to avoid conflicts)
      - "15102:15002"   # Spark Connect server (use 15102 to avoid conflicts)
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=0.0.0.0
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - BERDL_REDIS_HOST=redis
      - BERDL_REDIS_PORT=6379
      - BERDL_DELTALAKE_WAREHOUSE_DIRECTORY_PATH=s3a://cdm-lake/users-sql-warehouse
      - BERDL_HIVE_METASTORE_URI=thrift://hive-metastore:9083
      - USER=${STANDALONE_USER}
      # KBaseAuthServerInterceptor needs this to validate per-request KBase tokens
      # (matches spark_notebook production: configs/spark-defaults.conf.template).
      - KBASE_AUTH_URL=https://ci.kbase.us/services/auth/
    # Override entrypoint to start both Spark Master AND Spark Connect server.
    # The default entrypoint only starts Spark Master, but MCP server needs Spark Connect.
    # Configs mirror spark_notebook production (see spark-connect-notebook above),
    # including Polaris catalogs registered at startup with root creds.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/scripts/check_env.sh &&
        $$SPARK_HOME/sbin/start-master.sh &&
        sleep 10 &&
        $$SPARK_HOME/sbin/start-connect-server.sh \
          --master spark://localhost:7077 \
          --conf spark.cores.max=20 \
          --conf spark.sql.warehouse.dir=s3a://cdm-lake/users-sql-warehouse/ \
          --conf spark.hadoop.fs.s3a.endpoint=http://minio:9002 \
          --conf spark.hadoop.fs.s3a.access.key=minio \
          --conf spark.hadoop.fs.s3a.secret.key=minio123 \
          --conf spark.hadoop.fs.s3a.path.style.access=true \
          --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem \
          --conf spark.hadoop.fs.s3a.connection.ssl.enabled=false \
          --conf spark.hadoop.hive.metastore.uris=thrift://hive-metastore:9083 \
          --conf spark.sql.catalogImplementation=hive \
          --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension,org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.apache.sedona.sql.SedonaSqlExtensions \
          --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog \
          --conf spark.databricks.delta.retentionDurationCheck.enabled=false \
          --conf spark.connect.session.manager.defaultSessionTimeout=10h \
          --conf spark.connect.grpc.interceptor.classes=us.kbase.spark.KBaseAuthServerInterceptor \
          --conf spark.sql.catalog.my=org.apache.iceberg.spark.SparkCatalog \
          --conf spark.sql.catalog.my.type=rest \
          --conf spark.sql.catalog.my.uri=http://polaris:8181/api/catalog \
          --conf spark.sql.catalog.my.credential=root:s3cr3t \
          --conf spark.sql.catalog.my.warehouse=user_$${USER} \
          --conf spark.sql.catalog.my.scope=PRINCIPAL_ROLE:ALL \
          --conf spark.sql.catalog.my.token-refresh-enabled=false \
          --conf spark.sql.catalog.my.s3.endpoint=http://minio:9002 \
          --conf spark.sql.catalog.my.s3.access-key-id=minio \
          --conf spark.sql.catalog.my.s3.secret-access-key=minio123 \
          --conf spark.sql.catalog.my.s3.path-style-access=true \
          --conf spark.sql.catalog.my.s3.region=us-east-1 \
          --conf spark.sql.catalog.$${USER}=org.apache.iceberg.spark.SparkCatalog \
          --conf spark.sql.catalog.$${USER}.type=rest \
          --conf spark.sql.catalog.$${USER}.uri=http://polaris:8181/api/catalog \
          --conf spark.sql.catalog.$${USER}.credential=root:s3cr3t \
          --conf spark.sql.catalog.$${USER}.warehouse=user_$${USER} \
          --conf spark.sql.catalog.$${USER}.scope=PRINCIPAL_ROLE:ALL \
          --conf spark.sql.catalog.$${USER}.token-refresh-enabled=false \
          --conf spark.sql.catalog.$${USER}.s3.endpoint=http://minio:9002 \
          --conf spark.sql.catalog.$${USER}.s3.access-key-id=minio \
          --conf spark.sql.catalog.$${USER}.s3.secret-access-key=minio123 \
          --conf spark.sql.catalog.$${USER}.s3.path-style-access=true \
          --conf spark.sql.catalog.$${USER}.s3.region=us-east-1 \
          --conf spark.sql.catalog.globalusers=org.apache.iceberg.spark.SparkCatalog \
          --conf spark.sql.catalog.globalusers.type=rest \
          --conf spark.sql.catalog.globalusers.uri=http://polaris:8181/api/catalog \
          --conf spark.sql.catalog.globalusers.credential=root:s3cr3t \
          --conf spark.sql.catalog.globalusers.warehouse=tenant_globalusers \
          --conf spark.sql.catalog.globalusers.scope=PRINCIPAL_ROLE:ALL \
          --conf spark.sql.catalog.globalusers.token-refresh-enabled=false \
          --conf spark.sql.catalog.globalusers.s3.endpoint=http://minio:9002 \
          --conf spark.sql.catalog.globalusers.s3.access-key-id=minio \
          --conf spark.sql.catalog.globalusers.s3.secret-access-key=minio123 \
          --conf spark.sql.catalog.globalusers.s3.path-style-access=true \
          --conf spark.sql.catalog.globalusers.s3.region=us-east-1 &&
        tail -f /dev/null
    volumes:
      # Mount hive-site.xml for HMS client configuration
      # This enables Spark Connect to use external HMS instead of embedded Derby
      - ./configs/hive-site.xml:/usr/local/spark/conf/hive-site.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/15002'"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      - hive-metastore
      - minio
      - redis

  spark-worker-1:
    # image: ghcr.io/berdatalakehouse/kube_spark_manager_image:main
    # platform: linux/amd64
    build:
      context: ../kube_spark_manager_image
      dockerfile: Dockerfile
      args:
        BASE_TAG: local
        BASE_REGISTRY: ""
    ports:
      - "8191:8081"  # Spark Worker Web UI (use 8191 to avoid conflicts)
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=10
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_PORT=8081
      - SPARK_WORKER_WEBUI_PORT=8081
      - BERDL_REDIS_HOST=redis
      - BERDL_REDIS_PORT=6379
      - BERDL_DELTALAKE_WAREHOUSE_DIRECTORY_PATH=s3a://cdm-lake/users-sql-warehouse
      - BERDL_HIVE_METASTORE_URI=thrift://hive-metastore:9083
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'spark.deploy.worker' > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      spark-master:
        condition: service_healthy

  spark-worker-2:
    # image: ghcr.io/berdatalakehouse/kube_spark_manager_image:main
    # platform: linux/amd64
    build:
      context: ../kube_spark_manager_image
      dockerfile: Dockerfile
      args:
        BASE_TAG: local
        BASE_REGISTRY: ""
    ports:
      - "8192:8082"  # Spark Worker Web UI (use 8192 to avoid conflicts)
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=10
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_PORT=8082
      - SPARK_WORKER_WEBUI_PORT=8082
      - BERDL_REDIS_HOST=redis
      - BERDL_REDIS_PORT=6379
      - BERDL_DELTALAKE_WAREHOUSE_DIRECTORY_PATH=s3a://cdm-lake/users-sql-warehouse
      - BERDL_HIVE_METASTORE_URI=thrift://hive-metastore:9083
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'spark.deploy.worker' > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      spark-master:
        condition: service_healthy

  hive-metastore:
    # image: ghcr.io/berdatalakehouse/hive_metastore:main
    # platform: linux/amd64
    build:
      context: ../hive_metastore
      dockerfile: Dockerfile
      args:
        # IMPORTANT: Spark 4.0.0 is only officially compatible with Hive Metastore 4.0.0
        # Using newer Hive versions (4.1.0+) causes Thrift protocol incompatibilities
        HIVE_IMAGE_TAG: "4.0.0"
    ports:
      - "9084:9083"  # Use 9084 on host to avoid conflicts with local Hive Metastore
    environment:
      # PostgreSQL database configuration
      - POSTGRES_DB=hive
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hivepassword
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

      # MinIO S3 configuration
      - S3_ENDPOINT=http://minio:9002
      - S3_ACCESS_KEY=minio
      - S3_SECRET_KEY=minio123

      # Delta Lake warehouse directory
      - DELTALAKE_WAREHOUSE_DIR=s3a://cdm-lake/users-sql-warehouse
    volumes:
      # Override default hive-site.xml template to enable S3 warehouse directory
      - ./configs/hive-metastore-site.xml:/opt/hive/conf/hive-site.xml.template:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9083'"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16.3
    ports:
      - "5433:5432"  # Use 5433 on host to avoid conflicts with local PostgreSQL
    environment:
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hivepassword
      - POSTGRES_DB=hive
      - READONLY_USER=readonly
      - READONLY_PASSWORD=readonlypassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres-readonly.sh:/docker-entrypoint-initdb.d/01-init-readonly.sh:ro
      - ./scripts/init-polaris-db.sh:/docker-entrypoint-initdb.d/02-init-polaris-db.sh:ro
      - ./scripts/init-mms-db.sh:/docker-entrypoint-initdb.d/03-init-mms-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 5s
      timeout: 2s
      retries: 15

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z-cpuv1
    ports:
      - "9022:9002"  # MinIO API (use 9022 on host to avoid conflicts)
      - "9023:9003"  # MinIO Console (use 9023 on host to avoid conflicts)
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    healthcheck:
      test: timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9002' || exit 1
      interval: 1s
      timeout: 10s
      retries: 5
    command: server --address 0.0.0.0:9002 --console-address 0.0.0.0:9003 /data
    volumes:
      - minio_data:/data

  minio-create-bucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Configuring MinIO...';
      mc alias set local http://minio:9002 minio minio123;

      echo 'Creating buckets...';
      mc mb --ignore-existing local/cdm-lake;
      mc mb --ignore-existing local/cdm-spark-job-logs;

      echo 'Creating warehouse directory...';
      echo '' | mc pipe local/cdm-lake/users-sql-warehouse/.s3keep;

      echo 'Creating spark job logs directories for test users...';
      echo '' | mc pipe local/cdm-spark-job-logs/spark-job-logs/${CONNECT_USER}/.s3keep;
      echo '' | mc pipe local/cdm-spark-job-logs/spark-job-logs/${STANDALONE_USER}/.s3keep;

      echo 'Creating service accounts...';
      mc admin user svcacct add --access-key minio-readonly --secret-key minio123 local minio || true;
      mc admin user svcacct add --access-key minio-readwrite --secret-key minio123 local minio || true;
      mc admin user svcacct add --access-key minio-log-access --secret-key minio123 local minio || true;

      echo 'MinIO configuration complete.';
      "

  polaris-db-init:
    image: postgres:16.3
    environment:
      - PGPASSWORD=hivepassword
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        if psql -h postgres -U hive -d hive -tAc "SELECT 1 FROM pg_database WHERE datname = 'polaris'" | grep -q 1; then
          echo "Polaris database already exists"
        else
          psql -h postgres -U hive -d hive -c "CREATE DATABASE polaris"
          echo "Polaris database created"
        fi
    depends_on:
      postgres:
        condition: service_healthy

  polaris-bootstrap:
    image: apache/polaris-admin-tool:latest
    environment:
      - POLARIS_PERSISTENCE_TYPE=relational-jdbc
      - QUARKUS_DATASOURCE_DB_KIND=postgresql
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/polaris
      - QUARKUS_DATASOURCE_USERNAME=hive
      - QUARKUS_DATASOURCE_PASSWORD=hivepassword
    # Bootstrap exits 3 if the metastore is already bootstrapped (expected with persistent storage).
    # Treat exit 3 as success so docker compose doesn't fail on subsequent runs.
    entrypoint: ["sh", "-c"]
    command:
      - |
        output=$$(java -jar /deployments/polaris-admin-tool.jar bootstrap --realm=POLARIS --credential=POLARIS,root,s3cr3t 2>&1)
        rc=$$?
        printf '%s\n' "$$output"
        if [ $$rc -eq 3 ]; then
          if printf '%s\n' "$$output" | grep -Eqi "already.*bootstrapped"; then
            echo "Already bootstrapped - skipping (OK)"
            exit 0
          fi
        fi
        exit $$rc
    depends_on:
      polaris-db-init:
        condition: service_completed_successfully

  polaris:
    image: apache/polaris:latest
    ports:
      - "8183:8181"  # Polaris API (use 8183 on host to avoid conflicts)
    environment:
      # Persistence — PostgreSQL instead of in-memory
      - POLARIS_PERSISTENCE_TYPE=relational-jdbc
      - QUARKUS_DATASOURCE_DB_KIND=postgresql
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/polaris
      - QUARKUS_DATASOURCE_USERNAME=hive
      - QUARKUS_DATASOURCE_PASSWORD=hivepassword
      # Realm configuration
      - POLARIS_REALM_NAME=default-realm
      # MinIO credentials for Polaris's own S3 access (metadata files).
      # Polaris reads endpointInternal + pathStyleAccess from each catalog's storageConfigInfo.
      # STS is disabled per-catalog via stsUnavailable:true (not the global SKIP_CREDENTIAL flag).
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8182/q/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      polaris-bootstrap:
        condition: service_completed_successfully

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # Use 6380 on host to avoid conflicts with local Redis
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  # =========================================================================
  # TRINO QUERY ENGINE
  # =========================================================================
  # Trino coordinator + worker for alternative query engine.
  # Uses BERDL access control plugin for namespace isolation.
  # Scale workers: docker compose up -d --scale trino-worker=N
  # =========================================================================
  trino:
    # image: ghcr.io/berdatalakehouse/trino_access_control:main
    # platform: linux/amd64
    build:
      context: ../trino_access_control
      dockerfile: Dockerfile
      args:
        TRINO_VERSION: "479"
    ports:
      - "8083:8080"  # Trino Web UI / API
    volumes:
      - ./configs/trino/config.properties:/etc/trino/config.properties
      - ./configs/trino/access-control.properties:/etc/trino/access-control.properties
      - ./configs/trino/resource-groups.properties:/etc/trino/resource-groups.properties
      - ./configs/trino/resource-groups.json:/etc/trino/resource-groups.json
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      minio-manager-service:
        condition: service_healthy
      polaris:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 5
    stop_grace_period: 150s

  trino-worker:
    # image: ghcr.io/berdatalakehouse/trino_access_control:main
    # platform: linux/amd64
    build:
      context: ../trino_access_control
      dockerfile: Dockerfile
      args:
        TRINO_VERSION: "479"
    volumes:
      - ./configs/trino/worker-config.properties:/etc/trino/config.properties
    depends_on:
      trino:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  redis_data:
